<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期中考戰備小屋 V2 - 小豆芽升級版</title>
    <style>
        :root {
            --bg-color: #f0f8ff;
            --panel-bg: #ffffff;
            --text-main: #34495e;
            --text-muted: #95a5a6;
            --accent: #74b9ff;
            --accent-shadow: rgba(116, 185, 255, 0.3);
            --success: #81c784;
            --success-shadow: rgba(129, 199, 132, 0.3);
            --danger: #ffb6b9;
            --unfinished-border: #1e3799; 
            --finished-border: #ffb6c1;   
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', 'Rounded Mplus 1c', 'Yu Gothic', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            padding: 15px; 
            gap: 15px; 
            overflow: hidden;
            background-image: radial-gradient(circle, rgba(116, 185, 255, 0.15) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .panel { 
            background: var(--panel-bg); 
            border-radius: 20px; 
            padding: 15px; 
            border: 2px solid #e3f0ff; 
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px var(--accent-shadow);
            display: flex;
            flex-direction: column;
        }

        .left-panel { flex: 2; gap: 15px; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; }

        .header-row {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px dashed #d1e8ff; padding-bottom: 8px; margin-bottom: 12px; 
        }
        h2 { color: var(--accent); font-size: 1.3rem; letter-spacing: 1px; font-weight: 700; }
        
        .btn-gear {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 5px;
            border-radius: 50%; transition: 0.3s;
        }
        .btn-gear svg { width: 20px; height: 20px; }
        .btn-gear:hover { color: var(--accent); background: #eaf4ff; transform: rotate(45deg); }

        #clock { 
            font-size: 3.5rem; font-weight: 900; text-align: center; color: var(--accent); 
            font-family: 'Poppins', sans-serif; letter-spacing: 2px; margin: 5px 0; 
            background: #eaf4ff; border-radius: 15px; padding: 5px;
        }

        .focus-noise-panel {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 10px;
        }
        .noise-btn {
            background: #fff; border: 2px solid #e3f0ff; color: var(--text-muted);
            padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .noise-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .input-group { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        input[type="text"], input[type="time"], select { 
            padding: 8px 12px; border-radius: 10px; border: 2px solid #eee; outline: none; 
            background: #fff; color: var(--text-main); font-size: 0.9rem; 
        }
        input[type="text"] { flex: 2; min-width: 120px; }
        select { flex: 1; cursor: pointer; color: var(--accent); font-weight: bold; }
        input[type="time"] { 
    width: 150px; /* 小豆芽施法：把這裡變寬！✨ */
    font-family: 'Poppins', sans-serif; 
}
        
        input[type="text"]:focus, input[type="time"]:focus, select:focus { border-color: var(--accent); box-shadow: 0 4px 10px var(--accent-shadow); }
        
        button { cursor: pointer; border: none; outline: none; transition: 0.3s; }
        .btn-add { padding: 8px 15px; border-radius: 10px; background: var(--accent); color: #fff; font-weight: bold; font-size: 0.9rem; }
        .btn-add:hover { background: #5fa4e6; box-shadow: 0 4px 10px var(--accent-shadow); }
        
        .btn-delete { 
            background: transparent; color: var(--danger); border: 2px solid var(--danger); 
            border-radius: 8px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
        }
        .btn-delete svg { width: 14px; height: 14px; }
        .btn-delete:hover { background: var(--danger); color: #fff; }

        #exam-list { overflow-y: auto; padding-right: 5px; flex: 1; }
        #exam-list::-webkit-scrollbar, .custom-scroll::-webkit-scrollbar { width: 6px; }
        #exam-list::-webkit-scrollbar-thumb, .custom-scroll::-webkit-scrollbar-thumb { background: #d1e8ff; border-radius: 4px; }

        .exam-item { 
            background: #fff; margin-bottom: 10px; padding: 10px; border-radius: 12px; 
            border: 2px solid var(--unfinished-border); 
            border-left-width: 6px; border-left-color: var(--unfinished-border);
            transition: all 0.5s ease; position: relative;
        }

        .exam-finished {
            border-color: var(--finished-border) !important; 
            border-left-color: var(--finished-border) !important;
            background-color: #fffafb; 
        }

        .exam-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .exam-info { font-size: 1.1rem; font-weight: bold; }
        .exam-time { color: var(--accent); font-family: 'Poppins', sans-serif; font-size: 0.9rem; }
        
        .progress-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; width: 100%; background: var(--text-muted); transition: width 1s linear, background-color 0.5s; }
        .progress-active { background: var(--success); box-shadow: 0 4px 10px var(--success-shadow); }

        .tabs-container {
            display: flex; justify-content: space-between; align-items: flex-end; 
            margin-bottom: 10px; border-bottom: 2px dashed #d1e8ff; padding-bottom: 5px;
        }
        .tabs { display: flex; gap: 5px; }
        .tab-btn {
            background: #f4f9ff; color: var(--text-muted); padding: 6px 15px; border-radius: 10px 10px 0 0; 
            font-size: 0.85rem; font-weight: bold; border: 2px solid transparent; border-bottom: none; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 -2px 10px var(--accent-shadow); }
        .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .tab-content.active { display: flex; }

        textarea { flex: 1; width: 100%; resize: none; background: #fff; border: 2px solid #eee; border-radius: 12px; color: var(--text-main); padding: 12px; font-size: 16px; outline: none; }
        
        /* 字體調整控制列 */
        .font-control {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
            padding: 5px 10px; background: #eaf4ff; border-radius: 10px;
        }
        .font-control span { font-size: 0.8rem; font-weight: bold; color: var(--accent); }
        .font-control input[type="range"] { flex: 1; height: 4px; }

        .audio-player-ui { background: #eaf4ff; border: 2px solid #e3f0ff; border-radius: 15px; padding: 10px; margin-top: auto; }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(3px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; width: 520px; max-width: 95%; border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 3px solid #e3f0ff;
        }
        .modal-content h3 { color: var(--accent); text-align: center; margin-bottom: 20px; }
        .period-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: bold; }
        .period-row input { width: 145px; padding: 8px; font-family: 'Poppins', sans-serif; text-align: center; border: 2px solid #eee; border-radius: 8px; }
        .modal-actions { display: flex; justify-content: space-between; margin-top: 25px; }
        .btn-modal { padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }
        .btn-cancel { background: #eee; color: var(--text-muted); }
        .btn-save { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>⚙️ 節次時間設定</h3>
            <div id="period-settings-container"></div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeSettings()">取消</button>
                <button class="btn-modal btn-save" onclick="saveSettings()">儲存設定</button>
            </div>
        </div>
    </div>

    <div class="left-panel panel">
        <div class="header-row">
            <h2>🌱 小豆芽的學霸戰備小屋 2.0</h2>
            <button class="btn-gear" onclick="openSettings()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
        
        <div class="input-group">
            <input type="text" id="subject" placeholder="科目">
            <select id="quick-select" onchange="applyQuickSelect()">
                <option value="">快速選取</option>
                <option value="1">第 1 節</option>
                <option value="2">第 2 節</option>
                <option value="3">第 3 節</option>
                <option value="4">第 4 節</option>
                <option value="5">第 5 節</option>
                <option value="6">第 6 節</option>
                <option value="7">第 7 節</option>
            </select>
            <input type="time" id="start-time">
            <input type="time" id="end-time">
            <button class="btn-add" onclick="addExam()">✨ 新增</button>
        </div>
        <div id="exam-list"></div>
    </div>

    <div class="right-panel">
        <div class="panel">
            <div id="clock">00:00:00</div>
            <div class="focus-noise-panel">
                <button class="noise-btn" id="btn-rain" onclick="toggleNoise('rain')">🌧️ 下雨聲</button>
                <button class="noise-btn" id="btn-deep" onclick="toggleNoise('brown')">🌊 深海</button>
            </div>
        </div>

        <div class="panel" style="flex: 1;">
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('audio')">🎵 音訊檔</button>
                    <button class="tab-btn" onclick="switchTab('notes')">📝 提醒我</button>
                </div>
                <label style="color: var(--accent); font-size: 0.8rem; font-weight: bold; cursor: pointer; border: 2px solid; padding: 4px 8px; border-radius: 8px;">
                    <input type="file" id="file-input" accept="audio/*" multiple style="display:none;" onchange="handleFiles(this.files)">⊕ 選擇檔案
                </label>
            </div>
            
            <div id="tab-audio" class="tab-content active">
                <div id="attachment-list" class="custom-scroll" style="overflow-y: auto; flex: 1; margin-bottom: 10px;"></div>
                <div class="audio-player-ui">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <div id="audio-title" style="color:var(--accent); font-size:0.85rem; font-weight:bold;">尚未載入</div>
                        <div style="display:flex; gap:8px;">
                            <button onclick="togglePlayPause()" id="play-pause-btn" style="width:30px; height:30px; border-radius:50%; background:#fff; color:var(--accent); border:2px solid;">▶</button>
                            <button onclick="stopAudio()" style="width:30px; height:30px; border-radius:50%; background:#fff; color:var(--danger); border:2px solid;">⏹</button>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px; font-size:0.8rem; font-family:Poppins;">
                        <span id="audio-current">00:00</span>
                        <input type="range" id="audio-slider" style="flex:1;" value="0" min="0" step="1">
                        <span id="audio-duration">00:00</span>
                    </div>
                    <audio id="audio-player" style="display: none;"></audio>
                </div>
            </div>

            <div id="tab-notes" class="tab-content">
                <div class="font-control">
                    <span>字體大小</span>
                    <input type="range" id="font-resizer" min="12" max="48" value="16" oninput="changeFontSize(this.value)">
                    <span id="font-val">16px</span>
                </div>
                <textarea id="notes-area" placeholder="寫下考前的小提醒吧..."></textarea>
            </div>
        </div>
    </div>

    <script>
        // --- 初始化與儲存邏輯 (LocalStorage) ---
        let exams = JSON.parse(localStorage.getItem('exams')) || [];
        let periodTimes = JSON.parse(localStorage.getItem('periodTimes')) || {
            1: { start: "08:40", end: "09:20" }, 2: { start: "09:30", end: "10:10" },
            3: { start: "10:30", end: "11:10" }, 4: { start: "11:20", end: "12:00" },
            5: { start: "13:30", end: "14:10" }, 6: { start: "14:20", end: "15:00" },
            7: { start: "15:20", end: "16:00" }
        };

        window.onload = () => {
            renderExams();
            const savedNotes = localStorage.getItem('studyNotes');
            if(savedNotes) document.getElementById('notes-area').value = savedNotes;
            const savedFontSize = localStorage.getItem('notesFontSize') || 16;
            changeFontSize(savedFontSize);
            document.getElementById('font-resizer').value = savedFontSize;
        };

        document.getElementById('notes-area').oninput = (e) => {
            localStorage.setItem('studyNotes', e.target.value);
        };

        function changeFontSize(val) {
            document.getElementById('notes-area').style.fontSize = val + 'px';
            document.getElementById('font-val').textContent = val + 'px';
            localStorage.setItem('notesFontSize', val);
        }

        // --- 考試列表功能 ---
        function renderExams() {
            const list = document.getElementById('exam-list');
            list.innerHTML = '';
            exams.forEach(exam => {
                const item = document.createElement('div');
                item.className = 'exam-item';
                item.id = `exam-box-${exam.id}`;
                item.innerHTML = `
                    <div class="exam-header"><span class="exam-info">${exam.subject}</span>
                        <button class="btn-delete" onclick="deleteExam(${exam.id})">✕</button>
                    </div>
                    <div class="exam-time" style="margin-bottom:6px;">${exam.start} - ${exam.end}</div>
                    <div class="progress-bg"><div class="progress-bar" id="progress-${exam.id}" style="width: 100%;"></div></div>
                `;
                list.appendChild(item);
            });
            updateProgress();
            localStorage.setItem('exams', JSON.stringify(exams));
        }

        function addExam() {
            const subject = document.getElementById('subject').value;
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;
            if (!subject || !startTime || !endTime) return alert('請填寫完整喔！');
            exams.push({ id: Date.now(), subject, start: startTime, end: endTime });
            exams.sort((a, b) => a.start.localeCompare(b.start)); 
            renderExams();
            document.getElementById('subject').value = '';
        }

        function deleteExam(id) {
            exams = exams.filter(e => e.id !== id);
            renderExams();
        }

        // --- 時鐘與進度條 ---
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-TW', { hour12: false });
            updateProgress();
        }
        setInterval(updateClock, 1000);

        function updateProgress() {
            const now = new Date();
            const currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            exams.forEach(exam => {
                const progressBar = document.getElementById(`progress-${exam.id}`);
                const examBox = document.getElementById(`exam-box-${exam.id}`);
                if (!progressBar || !examBox) return;
                const [sh, sm] = exam.start.split(':').map(Number);
                const [eh, em] = exam.end.split(':').map(Number);
                const ss = sh * 3600 + sm * 60, es = eh * 3600 + em * 60;
                if (currentSeconds >= es) {
                    progressBar.style.width = '0%';
                    examBox.classList.add('exam-finished');
                } else if (currentSeconds >= ss) {
                    progressBar.style.width = `${((es - currentSeconds) / (es - ss)) * 100}%`;
                    progressBar.classList.add('progress-active');
                    examBox.classList.remove('exam-finished');
                } else {
                    progressBar.style.width = '100%';
                    examBox.classList.remove('exam-finished');
                }
            });
        }

        // --- 音訊播放器 (修復拖曳 Bug) ---
        const audioPlayer = document.getElementById('audio-player');
        const audioSlider = document.getElementById('audio-slider');
        let isDragging = false;

        audioSlider.oninput = () => { isDragging = true; };
        audioSlider.onchange = () => { 
            audioPlayer.currentTime = audioSlider.value; 
            isDragging = false; 
        };

        audioPlayer.ontimeupdate = () => {
            if(!isDragging) audioSlider.value = audioPlayer.currentTime;
            document.getElementById('audio-current').textContent = formatTime(audioPlayer.currentTime);
        };

        audioPlayer.onloadedmetadata = () => {
            audioSlider.max = audioPlayer.duration;
            document.getElementById('audio-duration').textContent = formatTime(audioPlayer.duration);
        };

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function togglePlayPause() { 
            if(!audioPlayer.src) return; 
            audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause(); 
            document.getElementById('play-pause-btn').textContent = audioPlayer.paused ? '▶' : '⏸';
        }

        function stopAudio() { audioPlayer.pause(); audioPlayer.currentTime = 0; document.getElementById('play-pause-btn').textContent = '▶'; }

        function handleFiles(files) {
            const list = document.getElementById('attachment-list');
            Array.from(files).forEach(file => {
                const url = URL.createObjectURL(file);
                const item = document.createElement('div');
                item.style = "display:flex; justify-content:space-between; background:#fafcff; padding:8px; border-radius:10px; margin-bottom:6px; border:2px solid #e3f0ff; font-size:0.85rem;";
                item.innerHTML = `<span>🎵 ${file.name}</span><button onclick="audioPlayer.src='${url}'; document.getElementById('audio-title').textContent='${file.name}'; audioPlayer.play();" style="color:var(--accent); font-weight:bold;">載入</button>`;
                list.appendChild(item);
            });
        }

        // --- 學霸結界 (Procedural White Noise) ---
        let audioCtx, noiseNode, filterNode;
        function toggleNoise(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (noiseNode) {
                noiseNode.stop();
                noiseNode = null;
                document.querySelectorAll('.noise-btn').forEach(b => b.classList.remove('active'));
                if (currentNoiseType === type) return; 
            }
            
            const bufferSize = 2 * audioCtx.sampleRate, noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = noiseBuffer;
            noiseNode.loop = true;

            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.value = (type === 'rain') ? 1000 : 400; // 雨聲高頻較多，深海低頻較多

            noiseNode.connect(filterNode);
            filterNode.connect(audioCtx.destination);
            noiseNode.start();
            currentNoiseType = type;
            document.getElementById(type === 'rain' ? 'btn-rain' : 'btn-deep').classList.add('active');
        }
        let currentNoiseType = '';

        // --- 設定與 Tab 切換 ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function openSettings() {
            const container = document.getElementById('period-settings-container');
            container.innerHTML = '';
            for(let i = 1; i <= 7; i++) {
                container.innerHTML += `<div class="period-row"><span>第 ${i} 節</span><input type="time" id="set-p${i}-start" value="${periodTimes[i].start}"> ~ <input type="time" id="set-p${i}-end" value="${periodTimes[i].end}"></div>`;
            }
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        function saveSettings() {
            for(let i = 1; i <= 7; i++) {
                periodTimes[i].start = document.getElementById(`set-p${i}-start`).value;
                periodTimes[i].end = document.getElementById(`set-p${i}-end`).value;
            }
            localStorage.setItem('periodTimes', JSON.stringify(periodTimes));
            closeSettings();
        }
        function applyQuickSelect() {
            const val = document.getElementById('quick-select').value;
            if(val) {
                document.getElementById('start-time').value = periodTimes[val].start;
                document.getElementById('end-time').value = periodTimes[val].end;
            }
        }
    </script>
</body>
</html>
