<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期中考戰情室 - 究極分頁版</title>
    <style>
        :root {
            --bg-color: #050b14;
            --panel-bg: rgba(16, 25, 43, 0.85);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.6);
            --success: #00ff66;
            --success-glow: rgba(0, 255, 102, 0.6);
            --danger: #ff003c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            padding: 20px; 
            gap: 20px; 
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 專注型呼吸燈特效 */
        @keyframes breatheGlow {
            0% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.05), inset 0 0 10px rgba(0, 240, 255, 0.02); }
            50% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 0 15px rgba(0, 240, 255, 0.05); }
            100% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.05), inset 0 0 10px rgba(0, 240, 255, 0.02); }
        }

        .panel { 
            background: var(--panel-bg); 
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(10px);
            animation: breatheGlow 4s infinite ease-in-out; 
        }

        .left-panel { flex: 2; display: flex; flex-direction: column; gap: 20px; z-index: 2; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; z-index: 2; }

        h2 { 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 10px; 
            margin-bottom: 15px; 
            font-size: 1.5rem; 
            text-shadow: 0 0 10px var(--accent-glow);
            letter-spacing: 2px;
        }

        /* 隱藏真實的 file input */
        input[type="file"] { display: none; }
        .custom-file-upload {
            border: 1px solid var(--accent);
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        .custom-file-upload:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* 大型電子時鐘 */
        #clock { 
            font-size: 4.5rem; 
            font-weight: 900; 
            text-align: center; 
            color: var(--accent); 
            text-shadow: 0 0 20px var(--accent-glow); 
            font-family: 'Courier New', Courier, monospace; 
            letter-spacing: 4px; 
            margin: 10px 0; 
        }

        /* 表單輸入區 */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input[type="text"], input[type="time"] { padding: 12px; border-radius: 6px; border: 1px solid rgba(0, 240, 255, 0.3); outline: none; background: rgba(0,0,0,0.5); color: white; transition: 0.3s; }
        input[type="text"]:focus, input[type="time"]:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        input[type="time"] { font-family: 'Courier New', Courier, monospace; }
        
        button { cursor: pointer; border: none; outline: none; transition: 0.3s; }
        .btn-add { padding: 12px; border-radius: 6px; background: rgba(0, 240, 255, 0.1); color: var(--accent); font-weight: bold; border: 1px solid var(--accent); letter-spacing: 1px; }
        .btn-add:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }
        
        /* 升級版：圖示型刪除按鈕 */
        .btn-delete { 
            background: rgba(255, 0, 60, 0.1); 
            color: var(--danger); 
            border: 1px solid var(--danger); 
            border-radius: 6px; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .btn-delete svg { width: 16px; height: 16px; }
        .btn-delete:hover { 
            background: var(--danger); 
            color: #fff; 
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.6); 
        }

        /* 考試科目列表與進度條 */
        #exam-list { overflow-y: auto; padding-right: 10px; max-height: calc(100vh - 180px); }
        #exam-list::-webkit-scrollbar, .custom-scroll::-webkit-scrollbar { width: 6px; }
        #exam-list::-webkit-scrollbar-thumb, .custom-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        .exam-item { 
            background: rgba(0, 0, 0, 0.6); 
            margin-bottom: 15px; 
            padding: 15px; 
            border-radius: 8px; 
            border-left: 4px solid var(--text-muted);
            transition: all 0.3s ease;
        }
        
        .exam-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .exam-info { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; }
        .exam-time { color: var(--accent); font-family: 'Courier New', Courier, monospace; font-size: 1.1rem; }
        
        /* 絲滑的純綠色時間條 */
        .progress-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .progress-bar { 
            height: 100%; 
            width: 100%; 
            background: var(--text-muted);
            transition: width 1s linear, background-color 0.5s; 
        }
        .progress-active {
            background: var(--success);
            box-shadow: 0 0 15px var(--success-glow);
        }

        /* ===== 分頁系統 (Tabs) ===== */
        .tabs { display: flex; border-bottom: 1px solid rgba(0, 240, 255, 0.3); margin-bottom: 15px; gap: 5px; }
        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 8px 8px 0 0;
            font-size: 1rem;
            font-weight: bold;
            border: 1px solid transparent;
            border-bottom: none;
            transition: 0.3s;
        }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent);
            border-color: rgba(0, 240, 255, 0.3);
            text-shadow: 0 0 5px var(--accent-glow);
        }
        .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* 提醒事項輸入框 */
        textarea {
            flex: 1;
            width: 100%;
            resize: none;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            color: var(--text-main);
            padding: 15px;
            font-size: 1rem;
            line-height: 1.5;
            outline: none;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        /* 附加資料區 (檔案清單) */
        .file-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.9rem; margin-right: 10px;}
        .file-actions { display: flex; gap: 5px; }
        .btn-load { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; padding: 5px 10px; font-size: 0.8rem; }
        .btn-load:hover { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent-glow); }
        .btn-remove-file { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); border-radius: 4px; padding: 5px 8px; font-size: 0.8rem; }
        .btn-remove-file:hover { background: var(--danger); color: white; border-color: var(--danger); }

        /* 極簡音樂控制台 */
        .audio-player-ui {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: auto;
        }
        
        .audio-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
        .audio-title { color: var(--accent); font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .audio-controls { display: flex; gap: 8px; }
        .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 1rem; border-radius: 6px; background: rgba(0, 240, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .icon-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent-glow); }
        .icon-btn.stop { color: var(--text-muted); border-color: var(--text-muted); background: transparent; }
        .icon-btn.stop:hover { color: var(--danger); border-color: var(--danger); box-shadow: 0 0 10px rgba(255,0,60,0.5); }
        
        .audio-progress-container { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; font-family: monospace; color: var(--text-muted); }
        input[type="range"] { flex: 1; -webkit-appearance: none; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 5px var(--accent-glow); }
    </style>
</head>
<body>

    <div class="left-panel panel">
        <h2>⚡ 戰術排程設定</h2>
        <div class="input-group">
            <input type="text" id="subject" placeholder="輸入科目 (如: 經濟學)" style="flex: 2;">
            <input type="time" id="start-time" required>
            <span style="align-self: center; color: var(--accent);">➤</span>
            <input type="time" id="end-time" required>
            <button class="btn-add" onclick="addExam()">寫入排程</button>
        </div>
        <div id="exam-list">
            </div>
    </div>

    <div class="right-panel">
        <div class="panel">
            <h2>⏳ 系統時間</h2>
            <div id="clock">00:00:00</div>
        </div>

        <div class="panel" style="flex: 1; display: flex; flex-direction: column; padding-top: 10px;">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('audio')">🎵 音訊資料庫</button>
                <button class="tab-btn" onclick="switchTab('notes')">📝 提醒事項</button>
            </div>
            
            <div id="tab-audio" class="tab-content active">
                <label class="custom-file-upload">
                    <input type="file" id="file-input" accept="audio/*" multiple onchange="handleFiles(this.files)">
                    ⊕ 選擇檔案
                </label>
                
                <div id="attachment-list" class="custom-scroll" style="overflow-y: auto; flex: 1; margin-bottom: 15px;">
                    </div>

                <div class="audio-player-ui">
                    <div class="audio-top-row">
                        <div class="audio-title" id="audio-title">尚未載入音訊</div>
                        <div class="audio-controls">
                            <button class="icon-btn" onclick="togglePlayPause()" id="play-pause-btn" title="播放/暫停">▶</button>
                            <button class="icon-btn stop" onclick="stopAudio()" title="停止">⏹</button>
                        </div>
                    </div>
                    <div class="audio-progress-container">
                        <span id="audio-current">00:00</span>
                        <input type="range" id="audio-slider" value="0" min="0" step="1">
                        <span id="audio-duration">00:00</span>
                    </div>
                    <audio id="audio-player" style="display: none;"></audio>
                </div>
            </div>

            <div id="tab-notes" class="tab-content">
                <textarea placeholder="在這裡輸入各科目的考試重點、注意事項或是激勵自己的話語...&#10;&#10;例如：&#10;1. 記得帶 2B 鉛筆與橡皮擦。&#10;2. 經濟學第 4 章公式必考！"></textarea>
            </div>
        </div>
    </div>

    <script>
        // --- 0. 分頁切換邏輯 ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        // --- 1. 大型電子時鐘 ---
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. 考試排程與絲滑純綠色能量條 ---
        let exams = [];

        function addExam() {
            const subject = document.getElementById('subject').value;
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;

            if (!subject || !startTime || !endTime) return alert('請填寫完整的科目與時間設定！');

            exams.push({ id: Date.now(), subject, start: startTime, end: endTime });
            exams.sort((a, b) => a.start.localeCompare(b.start)); 
            renderExams();
            
            document.getElementById('subject').value = '';
            document.getElementById('start-time').value = '';
            document.getElementById('end-time').value = '';
        }

        function deleteExam(id) {
            exams = exams.filter(exam => exam.id !== id);
            renderExams();
        }

        function renderExams() {
            const list = document.getElementById('exam-list');
            list.innerHTML = '';

            exams.forEach(exam => {
                const item = document.createElement('div');
                item.className = 'exam-item';
                item.id = `exam-box-${exam.id}`;
                // 在這裡加入了 SVG 垃圾桶圖示！
                item.innerHTML = `
                    <div class="exam-header">
                        <span class="exam-info">${exam.subject}</span>
                        <span class="exam-time">${exam.start} - ${exam.end}</span>
                        <button class="btn-delete" onclick="deleteExam(${exam.id})" title="刪除此排程">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-bar" id="progress-${exam.id}" style="width: 100%;"></div>
                    </div>
                `;
                list.appendChild(item);
            });
            updateProgress();
        }

        function updateProgress() {
            const now = new Date();
            const currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

            exams.forEach(exam => {
                const progressBar = document.getElementById(`progress-${exam.id}`);
                const examBox = document.getElementById(`exam-box-${exam.id}`);
                if (!progressBar) return;

                const [startH, startM] = exam.start.split(':').map(Number);
                const [endH, endM] = exam.end.split(':').map(Number);
                
                const startSeconds = startH * 3600 + startM * 60;
                const endSeconds = endH * 3600 + endM * 60;
                const totalDuration = endSeconds - startSeconds;

                if (currentSeconds >= endSeconds) {
                    progressBar.style.width = '0%';
                    progressBar.className = 'progress-bar'; 
                    examBox.style.borderLeftColor = '#334155';
                } else if (currentSeconds >= startSeconds) {
                    const elapsed = currentSeconds - startSeconds;
                    const remaining = totalDuration - elapsed;
                    const percentage = (remaining / totalDuration) * 100;
                    
                    progressBar.style.width = `${percentage}%`;
                    progressBar.className = 'progress-bar progress-active'; 
                    examBox.style.borderLeftColor = 'var(--success)';
                } else {
                    progressBar.style.width = '100%';
                    progressBar.className = 'progress-bar';
                    progressBar.style.background = 'var(--text-muted)';
                    examBox.style.borderLeftColor = 'var(--text-muted)';
                }
            });
        }
        setInterval(updateProgress, 1000); 

        // --- 3. 累加型音檔資料庫與極簡控制台 ---
        const audioPlayer = document.getElementById('audio-player');
        const audioTitle = document.getElementById('audio-title');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const audioSlider = document.getElementById('audio-slider');
        const audioCurrent = document.getElementById('audio-current');
        const audioDuration = document.getElementById('audio-duration');

        function handleFiles(files) {
            const list = document.getElementById('attachment-list');
            
            Array.from(files).forEach(file => {
                const fileId = 'file-' + Date.now() + Math.floor(Math.random() * 1000);
                const fileURL = URL.createObjectURL(file);
                const item = document.createElement('div');
                
                item.className = 'file-item';
                item.id = fileId;
                item.innerHTML = `
                    <span class="file-name" title="${file.name}">🎵 ${file.name}</span>
                    <div class="file-actions">
                        <button class="btn-load" onclick="loadAudio('${fileURL}', '${file.name}')">載入</button>
                        <button class="btn-remove-file" onclick="removeAudioFile('${fileId}')" title="移除此檔案">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
            
            document.getElementById('file-input').value = ""; 
        }

        function removeAudioFile(fileId) {
            const element = document.getElementById(fileId);
            if (element) {
                element.remove();
            }
        }

        function loadAudio(url, name) {
            audioPlayer.src = url;
            audioTitle.textContent = `${name}`;
            audioPlayer.load();
            audioPlayer.play();
        }

        function togglePlayPause() {
            if (!audioPlayer.src) return alert("請先從上方資料庫載入音訊檔案！");
            if (audioPlayer.paused) {
                audioPlayer.play();
            } else {
                audioPlayer.pause();
            }
        }

        function stopAudio() {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            updateUIState();
        }

        audioPlayer.addEventListener('play', updateUIState);
        audioPlayer.addEventListener('pause', updateUIState);

        function updateUIState() {
            if (audioPlayer.paused) {
                playPauseBtn.innerHTML = '▶'; 
                playPauseBtn.style.background = 'rgba(0, 240, 255, 0.1)';
                playPauseBtn.style.color = 'var(--accent)';
            } else {
                playPauseBtn.innerHTML = '⏸'; 
                playPauseBtn.style.background = 'var(--accent)';
                playPauseBtn.style.color = '#000';
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        audioPlayer.addEventListener('loadedmetadata', () => {
            audioSlider.max = Math.floor(audioPlayer.duration);
            audioDuration.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (!audioSlider.dataset.dragging) {
                audioSlider.value = Math.floor(audioPlayer.currentTime);
            }
            audioCurrent.textContent = formatTime(audioPlayer.currentTime);
        });

        audioSlider.addEventListener('mousedown', () => audioSlider.dataset.dragging = true);
        audioSlider.addEventListener('mouseup', () => delete audioSlider.dataset.dragging);
        audioSlider.addEventListener('input', () => {
            audioCurrent.textContent = formatTime(audioSlider.value);
            audioPlayer.currentTime = audioSlider.value;
        });

    </script>
</body>
</html>
